<!DOCTYPE html>
<html lang="es" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow</title>
  <link rel="stylesheet" href="css/output.css">
</head>

<body class="bg-gray-100 dark:bg-gray-900 text-gray-800 dark:text-gray-200 transition-colors duration-300">

<header class="bg-blue-500 dark:bg-blue-600 text-white px-6 py-4 flex items-center justify-between shadow">
  <h1 class="text-xl font-bold tracking-wide">TaskFlow</h1>

  <button id="darkToggle"
    class="px-3 py-1 rounded bg-white/20 hover:bg-white/30 transition">
    🌙
  </button>
</header>

<main class="flex flex-col md:flex-row gap-6 p-6 md:p-10">

  <aside class="w-full md:w-64 bg-white dark:bg-gray-800 rounded-xl shadow p-4">

    <p class="text-xs uppercase tracking-wider text-gray-500 dark:text-gray-300 mb-3">
      Status
    </p>

    <div class="space-y-2">

      <button class="pill w-full text-left px-3 py-2 rounded-lg bg-gray-200 dark:bg-gray-700 hover:bg-blue-500 hover:text-white transition"
        data-filter-type="status" data-filter="all">
        All
      </button>

      <button class="pill w-full text-left px-3 py-2 rounded-lg bg-gray-200 dark:bg-gray-700 hover:bg-blue-500 hover:text-white transition"
        data-filter-type="status" data-filter="pending">
        Pending
      </button>

      <button class="pill w-full text-left px-3 py-2 rounded-lg bg-gray-200 dark:bg-gray-700 hover:bg-blue-500 hover:text-white transition"
        data-filter-type="status" data-filter="completed">
        Completed
      </button>

    </div>

    <div class="mt-6">
      <p class="text-xs uppercase tracking-wider text-gray-500 dark:text-gray-300 mb-3">
        Priority
      </p>
      <div class="space-y-2">
        <button class="pill w-full text-left px-3 py-2 rounded-lg bg-gray-200 dark:bg-gray-700 hover:bg-blue-500 hover:text-white transition"
          data-filter-type="priority" data-filter="all">
          All
        </button>
        <button class="pill w-full text-left px-3 py-2 rounded-lg bg-gray-200 dark:bg-gray-700 hover:bg-blue-500 hover:text-white transition"
          data-filter-type="priority" data-filter="high">
          High
        </button>
        <button class="pill w-full text-left px-3 py-2 rounded-lg bg-gray-200 dark:bg-gray-700 hover:bg-blue-500 hover:text-white transition"
          data-filter-type="priority" data-filter="medium">
          Medium
        </button>
        <button class="pill w-full text-left px-3 py-2 rounded-lg bg-gray-200 dark:bg-gray-700 hover:bg-blue-500 hover:text-white transition"
          data-filter-type="priority" data-filter="low">
          Low
        </button>
      </div>
    </div>

    <div class="mt-6">
      <p class="text-xs uppercase tracking-wider text-gray-500 dark:text-gray-300 mb-3">
        Category
      </p>
      <div class="space-y-2">
        <button class="pill w-full text-left px-3 py-2 rounded-lg bg-gray-200 dark:bg-gray-700 hover:bg-blue-500 hover:text-white transition"
          data-filter-type="category" data-filter="all">
          All
        </button>
        <button class="pill w-full text-left px-3 py-2 rounded-lg bg-gray-200 dark:bg-gray-700 hover:bg-blue-500 hover:text-white transition"
          data-filter-type="category" data-filter="work">
          Work
        </button>
        <button class="pill w-full text-left px-3 py-2 rounded-lg bg-gray-200 dark:bg-gray-700 hover:bg-blue-500 hover:text-white transition"
          data-filter-type="category" data-filter="studies">
          Studies
        </button>
        <button class="pill w-full text-left px-3 py-2 rounded-lg bg-gray-200 dark:bg-gray-700 hover:bg-blue-500 hover:text-white transition"
          data-filter-type="category" data-filter="personal">
          Personal
        </button>
      </div>
    </div>
  </aside>

  <section class="flex-1 bg-white dark:bg-gray-800 rounded-xl shadow p-5">

    <div class="flex flex-wrap gap-3 mb-6">

      <input id="taskInput"
        class="flex-1 min-w-[200px] border dark:border-gray-600 rounded-lg px-3 py-2 bg-white dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500"
        placeholder="New task...">

      <select id="prioritySelect"
        class="border dark:border-gray-600 rounded-lg px-3 py-2 bg-white dark:bg-gray-700">
        <option value="high">High</option>
        <option value="medium">Medium</option>
        <option value="low">Low</option>
      </select>

      <select id="categorySelect"
        class="border dark:border-gray-600 rounded-lg px-3 py-2 bg-white dark:bg-gray-700">
        <option value="work">Work</option>
        <option value="studies">Studies</option>
        <option value="personal">Personal</option>
      </select>

      <button id="addTaskBtn"
        class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg transition">
        + Add
      </button>

      <input id="searchInput"
        class="flex-1 min-w-[180px] border dark:border-gray-600 rounded-lg px-3 py-2 bg-white dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500"
        placeholder="Search...">
    </div>

    <div class="flex flex-wrap items-center justify-between gap-3 mb-6">
      <p class="text-sm text-gray-500 dark:text-gray-400">Sort tasks by title</p>
      <button id="sortToggleBtn"
        class="rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-700 dark:text-gray-200 px-4 py-2 hover:bg-blue-500 hover:text-white transition">
        A → Z
      </button>
    </div>

    <div class="overflow-x-auto">
      <table class="w-full text-sm">

        <thead>
          <tr class="border-b dark:border-gray-700 text-left text-gray-500">
            <th class="py-2"></th>
            <th class="py-2">Task</th>
            <th class="py-2">Priority</th>
            <th class="py-2">Category</th>
            <th class="py-2">Status</th>
            <th class="py-2">Actions</th>
            <th class="py-2">
              <span id="taskCounter" class="text-xs font-normal text-gray-400"></span>
            </th>
          </tr>
        </thead>

        <tbody id="taskBody"></tbody>

      </table>
    </div>

  </section>

</main>

<script src="js/task-utils.js"></script>
<script src="js/task-manager.js"></script>
</body>
</html>
