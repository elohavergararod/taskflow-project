<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow</title>
    <link rel="stylesheet" href="css/FirstWeb.css">
</head>
<body>
    <header>
        <h1>TaskFlow</h1>
    </header>
    <main>
        <aside>
            <nav>
                <ul>
                    <li><a href="#" id="filterAll">All</a></li>
                    <li><a href="#" id="filterPending">Pending</a></li>
                    <li><a href="#" id="filterCompleted">Completed</a></li>
                </ul>
            </nav>
        </aside>
        <section>
            <div class="task-form">
                <input type="text" id="taskInput" placeholder="New task">

                <select id="prioritySelect">
                    <option value="high">High</option>
                    <option value="medium">Medium</option>
                    <option value="low">Low</option>
                </select>

                <select id="categorySelect">
                    <option value="work">Work</option>
                    <option value="studies">Studies</option>
                    <option value="personal">Personal</option>
                </select>

                <button id="addTaskBtn">Add</button>

                <input type="text" id="searchInput" placeholder="Search task...">
            </div>
            <h2>Task List</h2>
            <ul class="task-list">
                <li class="task-item">
                    <div class="task-info">
                        <p class="task-title">Do First Practice</p>
                        <p class="task-category">Work</p>
                    </div>
                    <span class="badge high">High</span>
                </li>
                <li class="task-item">
                    <div class="task-info">
                        <p class="task-title">Do UD1 Test</p>
                        <p class="task-category">Studies</p>
                    </div>

                    <span class="badge high">High</span>
                </li>
                <li class="task-item">
                    <div class="task-info">
                        <p class="task-title">Do UD2 Test</p>
                        <p class="task-category">Studies</p>
                    </div>
                    <span class="badge medium">Medium</span>
                </li>
                <li class="task-item">
                    <div class="task-info">
                        <p class="task-title">Clean my room</p>
                        <p class="task-category">Personal</p>
                    </div>
                    <span class="badge low">Low</span>
                </li>
                <li class="task-item">
                    <div class="task-info">
                        <p class="task-title">Do exercise</p>
                        <p class="task-category">Personal</p>
                    </div>
                    <span class="badge low">Low</span>
                </li>
            </ul>
        </section>
        <script src="js/app.js"></script>
    </main>
</body>
</html>
